<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catatan - 2572013</title>
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 30px;
        background-color: #f4f6f8;
        max-width: 800px;
        margin: auto;
      }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 2px solid #ddd;
        padding-bottom: 20px;
        margin-bottom: 20px;
      }
      .nav-buttons button {
        padding: 10px 15px;
        margin-right: 10px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        background-color: #28a745;
        color: white;
      }
      .nav-buttons button:hover {
        opacity: 0.9;
      }
      #btnLogout {
        background-color: #dc3545;
        padding: 10px 20px;
        border: none;
        color: white;
        border-radius: 4px;
        cursor: pointer;
      }
      .panel {
        background: white;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        display: none;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h2 id="welcomeMsg" style="margin: 0"></h2>
      <button id="btnLogout">Logout</button>
    </div>

    <div class="nav-buttons">
      <button id="btnInfo">Tampilkan Info Penjualan</button>
      <button id="btnProduk">Tampilkan Produk Terlaris</button>
    </div>

    <div id="panelInfo" class="panel">
      <h3>Info Penjualan</h3>
      <p>
        Pendapatan minggu ini mengalami peningkatan sebesar 25% dibandingkan
        minggu sebelumnya.
      </p>
    </div>

    <div id="panelProduk" class="panel">
      <h3>⭐ Produk Terlaris</h3>
      <ul>
        <li>Sepatu Sneakers XYZ</li>
        <li>Hoodie Kasual</li>
        <li>Celana Kargo Hitam</li>
        <li>Baju Oversize</li>
        <li>Celana Kargo Hitam</li>
      </ul>
    </div>

    <script>
      $(document).ready(function () {
        var username = localStorage.getItem("username");

        if (!username) {
          window.location.replace("Tugas1_2572013.html");
          return;
        }

        $("#welcomeMsg").text("Selamat datang, " + username + "!");

        $("#btnInfo").click(function () {
          $("#panelProduk").hide();
          $("#panelInfo").fadeIn(200);
        });

        $("#btnProduk").click(function () {
          $("#panelInfo").hide();
          $("#panelProduk").fadeIn(200);
        });

        $("#btnLogout").click(function () {
          localStorage.removeItem("username");
          window.location.replace("Tugas1_2572013.html");
        });
      });
    </script>
  </body>
</html>
