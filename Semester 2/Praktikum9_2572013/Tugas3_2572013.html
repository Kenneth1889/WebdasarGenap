<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            height: 90vh;
            text-align: center;
            display: flex;
            transition: background-color 0.3s ease;
            font-family: Tahoma, sans-serif;
        }
        .kartu{
            width: 450px;
            height: 500px;
            border: 1px solid #000;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: auto;
            flex-direction: column;
            background-color: white;
            border-radius: 14px;
        }
        .rgb-group{
            display: flex;
            gap:10px;
            margin-bottom: 20px;
            

        }
        input{
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #000;
            font-weight: bold;

        }
        .btn-container{
            display: flex;
            gap: 10px;
    
            margin-bottom: 10px;
        }
        button{
            padding: 10px 10px;
            border-radius: 10px;
            background-color: #eee;
            border: 0px;
            font-weight: bold;
        }
        .display-area{
            display: flex;
            gap: 10px;
            flex-direction: column;
            font-size: 16px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            width: 320px;
            height:50px;
            padding: 10px 10px;
        }
        #counter{
            font-size: 24px;
            font-weight: bold;
        }
        .footer{
            margin-top:20px;
            border-top: 1px solid #ddd;
            padding-top: 10px;
            font-size: 10px;
            color: #777;
            font-weight:bold;
        }
        h1{
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="kartu">
    <h1>RGB Control Panel</h1>
    <div class="rgb-group">
    <input type="number" id="r" class="rgb-input" placeholder="R" min="0" max="255">
    <input type="number" id="g" class="rgb-input" placeholder="G" min="0" max="255">
    <input type="number" id="b" class="rgb-input" placeholder="B" min="0" max="255">
    </div>
    <div class="btn-container">
    <button class="btn-submit" onclick="color()">Terapkan</button>
    <button class="btn-random" onclick="randomColor()">Acak Warna</button>
    </div>
    <div class="display-area">
    <div>Skor Saat Ini:</div>
    <div id="counter">0</div>
    </div>
    <div class="btn-container">
        <button class="btn-add" onclick="tambah()">Tambah (+1)</button>
        <button class="btn-remove" onclick="kurang()">Kurang (-1)</button>
    </div>
    <button class="btn-reset" onclick="reset()">Reset Ke Default</button>
    <div class="footer">
    &copy; 2026 2572013 - Kenneth. All rights reserved.
    </div>
<script>
    function color() {
        var r = document.getElementById("r").value;
        var g = document.getElementById("g").value;
        var b = document.getElementById("b").value;
        document.body.style.backgroundColor = "rgb(" + r + "," + g + "," + b + ")";
    }
    function randomColor() {
        var r = Math.floor(Math.random() * 256);
        var g = Math.floor(Math.random() * 256);
        var b = Math.floor(Math.random() * 256);
        document.getElementById("r").value = r;
        document.getElementById("g").value = g;
        document.getElementById("b").value = b;
        document.body.style.backgroundColor = "rgb(" + r + "," + g + "," + b + ")";
    }

    function tambah() {
        var counter = document.getElementById("counter");
        var currentValue = parseInt(counter.innerText);
        counter.innerText = currentValue + 1;
    }

    function kurang() {
        var counter = document.getElementById("counter");
        var currentValue = parseInt(counter.innerText);
        counter.innerText = currentValue - 1;
    }

    function reset() {
        document.getElementById("r").value = "";
        document.getElementById("g").value = "";
        document.getElementById("b").value = "";
        document.body.style.backgroundColor = "white";
        document.getElementById("counter").innerText = "0";
    }
</script>
</div>
</div>
</body>
</html>
