<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz - 2572013</title>
    <style>
        body{
            font-family: Arial;
            display: flex;
            flex-direction: column;
            margin-left:30px;
        }
        button{
            width: 80px;
            margin-top: 15px;
        }
        p{
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <h1>Quiz Matematika</h1>
<div>Klik tombol di bawah untuk mulai mengerjakan soal matematika acak. Ketik "exit" atau tekan Cancel untuk berhenti.</div>
<button onclick="mulaiQuiz()">Mulai Quiz</button>
<h2 id="result"></h2>
<p id="datetime"></p>
<script>
function mulaiQuiz() {
    let playerScore = 0;
    let jumlahsoal = 0;
    var loop = true;
    while (loop == true) {
      var num1 = Math.floor(Math.random() * 20) + 1;
    var num2 = Math.floor(Math.random() * 20) + 1;
    const operasi = ["+", "-", "*",];
    var operator = operasi[Math.floor(Math.random() * operasi.length)]
    var question = num1 + " " + operator + " " + num2;
    var answer = eval(question);
    var userAnswer = prompt("Berapa hasil dari " + question + "?");
    if (userAnswer === null || userAnswer.toLowerCase() === "exit") {
            loop = false;
        }
    if (parseFloat(userAnswer) === answer) {
        alert("Jawaban benar!");
        playerScore++;
    } else {
        alert("Jawaban salah! Jawaban yang benar adalah " + answer)
    }  
    jumlahsoal++;
    }    
    var confim = confirm("Quiz selesai! Apakah Anda ingin menampilkan hasil?");
    if (confim === true) {
        document.getElementById("result").textContent = "Skor Akhir: " + playerScore + " / " + jumlahsoal;
        
    }
    document.getElementById("datetime").innerHTML = "Quiz selesai pada: " + new Date().toLocaleString();
}
</script>
    
</body>
</html>
