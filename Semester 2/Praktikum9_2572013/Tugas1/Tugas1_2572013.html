<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game - 2572013</title>
    <style>
        .tengah{
            margin: 0;
            min-height: 60vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .board{
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
        }
        .player-card{
            width: 180px;
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }
        .player-card img{
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        #skor{
            font-size: 28px;
            text-align: center;
        }
        .pilihan{
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .controls{
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        button{
            padding:10px;
            border-radius: 14px;
            border: 1px solid #000;
            cursor: pointer;
            background: #f5f5f5;
        }
        #hasil{
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div class="tengah">
        <div class="board">
            <div class="player-card" id="pemain"></div>
            <div id="skor">0 - 0</div>
            <div class="player-card" id="komputer"></div>
        </div>
        <div class="pilihan">
            <div class="controls">
                <button onclick="rock()">🪨</button>
                <button onclick="paper()">📜</button>
                <button onclick="scissors()">✂️</button>
            </div>
            <div id="hasil">Pilih tombol di atas</div>
        </div>
    </div>
    <script>
        let playerScore = 0;
        let compScore = 0;
        function computerChoice() {
            var rand = Math.floor(Math.random() * 3) + 1;
            if (rand === 1) {
                return "🪨";
            } else if (rand === 2) {
                return "📜";
            } else {
                return "✂️";
            }
        }
        function getImageHtml(choice) {
            if (choice === "🪨") {
                return '<img src="rock.png" alt="Batu">';
            } else if (choice === "📜") {
                return '<img src="paper.png" alt="Kertas">';
            } else {
                return '<img src="scissor.png" alt="Gunting">';
            }
        }

        function play(playerChoice) {
            var comp = computerChoice();
            document.getElementById("pemain").innerHTML = getImageHtml(playerChoice);
            document.getElementById("komputer").innerHTML = getImageHtml(comp);

            var result = "DRAW";
            if (playerChoice === comp) {
                result = "DRAW";
            } else if (
                (playerChoice === "🪨" && comp === "✂️") ||
                (playerChoice === "📜" && comp === "🪨") ||
                (playerChoice === "✂️" && comp === "📜")
            ) {
                result = "PLAYER WIN!";
                playerScore++;

            } else {
                result = "BOT WIN!";
                compScore++;
            }
            document.getElementById("hasil").innerHTML = result;
            document.getElementById("skor").innerHTML = playerScore + " - " + compScore;
        }

        function rock() {
            play("🪨");
        }

        function paper() {
            play("📜");
        }

        function scissors() {
            play("✂️");
        }
    </script>
</body>
</html>
