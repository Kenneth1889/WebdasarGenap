<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form - 2572013</title>
</head>
<body align="center" bgcolor="#b7eff7">
    <h1>Form Pengisian Kepuasan Pembelajaran Web</h1>
    <hr width="95%" color="#75d3de">
    <form>
        <p><b>Nama</b></p>
        <input type="text">
        <p><b>NRP</b></p>
        <input type="number">
        <h4>Berikan nilai Kepuasan</h4>
        <input type="radio" name="kepuasan" value="1"> 1&starf;
        <input type="radio" name="kepuasan" value="2"> 2&starf;
        <input type="radio" name="kepuasan" value="3"> 3&starf;
        <input type="radio" name="kepuasan" value="4"> 4&starf;
        <input type="radio" name="kepuasan" value="5"> 5&starf;
        <h4>Sintaks yang Dipelajari</h4>
            <select name="sintaks" id="sintaks" align="center">
                <option value="" disabled selected align="center">&emsp; &emsp; &emsp;-- Pilih -- &emsp; &emsp; &emsp;</option>
                <option value="sintaks" align="center">1. Sintaks Data</option>
                <option value="struktur" align="center">2. Struktur Data</option>
                <option value="oop" align="center">3. OOP (Object-Oriented Programming)</option>
                <option value="algoritma" align="center">4. Algoritma</option>
                <option value="database" align="center">5. Database</option>
                </option>
            </select>
        <h4>Bahasa Pemrograman yang Digunakan</h4>
        <input type="checkbox" name="html" value="HTML"> HTML
        <input type="checkbox" name="javascript" value="JavaScript"> JavaScript
        <input type="checkbox" name="python" value="Python"> Python
        <input type="checkbox" name="java" value="Java"> Java
        <input type="checkbox" name="css" value="CSS"> CSS
        <h4>Keterangan</h4>
        <p><textarea name="keterangan" id="keterangan" cols="40" rows="8" placeholder="Masukan keterangan belajar anda di sini!"></textarea></p>
        <br><input type="submit" value="Submit">
    </form>
    <hr width="95%" color="#75d3de">

</body>
</html>
